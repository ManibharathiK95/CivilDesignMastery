<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Civil Design Mastery</title>

<style>
:root{
  --bg:#f4f6f9;
  --sidebar:#1e293b;
  --sidebar-text:#cbd5e1;
  --primary:#2a7de1;
  --card:#fff;
}

body{
  margin:0;
  font-family:"Segoe UI",sans-serif;
  display:flex;
  background:var(--bg);
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:var(--sidebar);
  color:white;
  height:100vh;
  padding:20px;
  box-sizing:border-box;
}

.sidebar h2{
  margin-bottom:20px;
}

.menu-item{
  margin-bottom:10px;
  cursor:pointer;
  font-weight:600;
}

.submenu{
  margin-left:10px;
  display:none;
}

.submenu div{
  padding:8px;
  margin:5px 0;
  background:#334155;
  border-radius:6px;
  cursor:pointer;
}

.submenu div:hover{
  background:var(--primary);
}

/* MAIN */
.main{
  flex:1;
  padding:30px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
  margin-top:0;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>📘 Civil Mastery</h2>

  <!-- PHASE 1 -->
  <div class="menu-item" onclick="toggleMenu('phase1')">
    Phase 1 ▼
  </div>
  <div id="phase1" class="submenu">
    <div onclick="loadLesson('Intro to Engineering')">Intro to Engineering</div>
    <div onclick="loadLesson('Basic Math')">Basic Math</div>
    <div onclick="loadLesson('Drawing Basics')">Drawing Basics</div>
  </div>

  <!-- PHASE 2 -->
  <div class="menu-item" onclick="toggleMenu('phase2')">
    Phase 2 ▼
  </div>
  <div id="phase2" class="submenu">
    <div onclick="loadLesson('Structural Design')">Structural Design</div>
    <div onclick="loadLesson('Concrete Technology')">Concrete Technology</div>
    <div onclick="loadLesson('Site Planning')">Site Planning</div>
  </div>

</div>

<!-- MAIN CONTENT -->
<div class="main">
  <div class="card" id="content">
    <h1>Welcome 👋</h1>
    <p>Select a lesson from the sidebar to begin.</p>
  </div>
</div>

<script>
// Toggle submenu
function toggleMenu(id){
  const menu = document.getElementById(id);
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

// Load lesson dynamically
function loadLesson(title){
  document.getElementById("content").innerHTML = `
    <h1>${title}</h1>
    <p>This is your lesson content for <strong>${title}</strong>.</p>
    <p>Here you can add videos, PDFs, notes, etc.</p>
  `;
}

// Optional: Show logged-in user
const currentUser = localStorage.getItem("currentUser");
if(currentUser){
  console.log("Logged in as:", currentUser);
}
</script>

</body>
</html>
