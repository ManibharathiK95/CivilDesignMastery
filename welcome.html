<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome - Civil Design Mastery</title>
<style>
body{margin:0;font-family:"Segoe UI",sans-serif;background:#f4f6f9;display:flex;justify-content:center;align-items:center;height:100vh;}
.card{background:#fff;padding:30px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,0.1);text-align:center;}
button{padding:12px 25px;margin-top:20px;background:#2a7de1;color:white;border:none;border-radius:8px;cursor:pointer;}
button:hover{opacity:0.9;}
</style>
</head>
<body>
<div class="card">
<h1>Welcome 👋</h1>
<p>Thank you for joining Civil Design Mastery!</p>
<p>Click below to start learning.</p>
<button onclick="goDashboard()">Go to Dashboard</button>
</div>

<script>
// Redirect only if user exists
const currentUser = localStorage.getItem("currentUser");
if(!currentUser){window.location.href="index.html";}

function goDashboard(){window.location.href="dashboard.html";}
</script>
</body>
</html>
