<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome - Civil Design Mastery</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      padding: 24px;
      width: min(92vw, 460px);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }
    p {
      margin: 8px 0;
      color: #444;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    button {
      border: none;
      border-radius: 8px;
      cursor: pointer;
      padding: 10px 12px;
    }
    .primary {
      background: #2a7de1;
      color: #fff;
      flex: 1;
    }
    .ghost {
      background: #eceff4;
      color: #222;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">Welcome 👋</h1>
    <p id="contact"></p>
    <p id="status"></p>
    <div class="actions">
      <button class="primary" onclick="goToDashboard()">Continue</button>
      <button class="ghost" onclick="logout()">Logout</button>
    </div>
  </div>

  <script>
    function getUsers() {
      try {
        return JSON.parse(localStorage.getItem("users")) || {};
      } catch {
        return {};
      }
    }

    function boot() {
      const currentUser = localStorage.getItem("currentUser");
      const users = getUsers();
      const user = currentUser ? users[currentUser] : null;

      if (!currentUser || !user) {
        window.location.href = "index.html";
        return;
      }

      document.getElementById("title").innerText = `Welcome, ${user.name} ✅`;
      document.getElementById("contact").innerText = `Signed in as: ${currentUser}`;

      const completed = Object.keys(user.progress || {}).length;
      document.getElementById("status").innerText = `Progress entries synced: ${completed}`;
    }

    function goToDashboard() {
      window.location.href = "dashboard.html";
    }

    function logout() {
      localStorage.removeItem("currentUser");
      window.location.href = "index.html";
    }

    boot();
  </script>
</body>
</html>
