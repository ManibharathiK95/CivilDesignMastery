<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phase 1 Dashboard</title>
<style>
:root {
  --bg:#f4f6f9; --text:#222; --card:#fff; --primary:#2a7de1;
}
body.dark{--bg:#121212; --text:#f1f1f1; --card:#1e1e1e; --primary:#4da3ff;}
body{margin:0;font-family:"Segoe UI",sans-serif;background:var(--bg);color:var(--text);}
header{padding:15px 20px;background:var(--card);box-shadow:0 2px 8px rgba(0,0,0,0.1);display:flex;justify-content:space-between;align-items:center;}
.theme-toggle{background:none;border:none;font-size:20px;cursor:pointer;}
main{display:flex;min-height:calc(100vh - 60px);}
.sidebar{width:220px;background:var(--card);padding:15px;box-shadow:2px 0 6px rgba(0,0,0,0.05);}
.sidebar h3{margin-top:0;}
.sidebar ul{list-style:none;padding-left:0;}
.sidebar li{padding:8px;cursor:pointer;border-radius:6px;}
.sidebar li.locked{color:#999; cursor:not-allowed;}
.sidebar li:hover:not(.locked){background:var(--primary);color:white;}
.content{flex:1;padding:20px;}
button.lesson-btn{width:100%;padding:10px;margin:5px 0;background:var(--primary);color:white;border:none;border-radius:6px;cursor:pointer;}
button.lesson-btn:hover{opacity:0.9;}
</style>
</head>
<body>
<header>
<h2>Phase 1 Dashboard</h2>
<button class="theme-toggle" onclick="toggleTheme()">🌙</button>
</header>

<main>
<div class="sidebar">
<h3>Phases</h3>
<ul>
<li onclick="gotoPhase(1)">Phase 1</li>
<li onclick="gotoPhase(2)">Phase 2</li>
<li onclick="gotoPhase(3)">Phase 3</li>
</ul>
<h3>Phase 1 Lessons</h3>
<ul id="lessonList"></ul>
</div>

<div class="content">
<h3>Welcome to Phase 1</h3>
<p>Select a lesson from the sidebar to start learning.</p>
</div>
</main>

<script>
if(localStorage.getItem("theme")==="dark") document.body.classList.add("dark");
function toggleTheme(){
  document.body.classList.toggle("dark");
  localStorage.setItem("theme", document.body.classList.contains("dark")?"dark":"light");
}

const currentUser=localStorage.getItem("currentUser");
if(!currentUser) window.location.href="index.html";

const lessons=[
  {id:"Ph1_L01", title:"Introduction"},
  {id:"Ph1_L02", title:"Units, Standards & Codes"},
  {id:"Ph1_L03", title:"Basic Structural Concepts"},
  {id:"Ph1_L04", title:"Load Calculations"},
  {id:"Ph1_L05", title:"Foundation Types"}
];

function loadLessons(){
  let users=JSON.parse(localStorage.getItem("users"))||{};
  let progress=users[currentUser].progress||{};
  const list=document.getElementById("lessonList");
  list.innerHTML="";
  lessons.forEach((lesson,index)=>{
    const li=document.createElement("li");
    li.textContent=lesson.title;
    if(index>0 && !progress[lessons[index-1].id]) li.classList.add("locked");
    else li.onclick=()=>{window.location.href=lesson.id+".html";};
    list.appendChild(li);
  });
}
loadLessons();

function gotoPhase(p){
  alert("Phase "+p+" selected (lessons for Phase 1 displayed here).");
}
</script>
</body>
</html>
