<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phase 1 - Foundation Course</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .wrap {
      max-width: 980px;
      margin: 24px auto;
      padding: 0 16px 40px;
    }

    .topbar {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 3px 14px rgba(0,0,0,.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .topbar h1 {
      margin: 0;
      font-size: 1.25rem;
      color: #2563eb;
    }

    .muted {
      color: #6b7280;
      margin-top: 4px;
      font-size: .95rem;
    }

    .btn {
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn.outline {
      background: #fff;
      color: #2563eb;
      border: 2px solid #2563eb;
    }

    .progress {
      margin-top: 16px;
      height: 26px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress > div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg,#2563eb,#10b981);
      color:#fff;
      font-size:.82rem;
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:center;
      transition: width .3s;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 3px 14px rgba(0,0,0,.08);
    }

    .card h2 {
      margin: 0 0 8px;
      color: #1d4ed8;
      font-size: 1.08rem;
    }

    .card p {
      margin: 0 0 12px;
      color: #4b5563;
      line-height: 1.5;
      min-height: 44px;
    }

    .tag {
      display:inline-block;
      font-size:.82rem;
      padding:4px 8px;
      border-radius: 999px;
      background:#eef2ff;
      color:#4338ca;
      margin-bottom:8px;
    }

    .done {
      background: #dcfce7;
      color: #166534;
    }

    .openLink {
      display: inline-block;
      margin-top: 8px;
      color: #2563eb;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header class="topbar">
      <div>
        <h1>📚 Phase 1: Foundation</h1>
        <div class="muted">
          Welcome, <strong id="userName">Guest Learner</strong>
        </div>
      </div>
      <button class="btn outline" id="logoutBtn">Go Login</button>
    </header>

    <div class="progress">
      <div id="progressFill">0%</div>
    </div>

    <section class="grid" id="lessonGrid"></section>
  </div>

  <script>
    const lessons = [
      { id: 'L1', title: 'Stress & Strain Basics', page: 'lesson1.html', desc: 'Definition, formulas, examples, thumb rules, exercise and quiz.' },
      { id: 'L2', title: 'Bending Moment', page: 'lesson2.html', desc: 'Shear and bending moment basics with worked examples.' },
      { id: 'L3', title: 'Bending Stress', page: 'lesson3.html', desc: 'Flexure formula and section modulus.' },
      { id: 'L4', title: 'RC Beam Design', page: 'lesson4.html', desc: 'Design steps and checks.' },
      { id: 'L5', title: 'Shear Design', page: 'lesson5.html', desc: 'Concrete shear + stirrup contribution.' },
      { id: 'L6', title: 'One-way Slab Design', page: 'lesson6.html', desc: 'Load, moment and steel design for slab strip.' }
    ];

    function getUsers() {
      return JSON.parse(localStorage.getItem('demUsers') || '[]');
    }

    function getCurrentUserEmail() {
      return localStorage.getItem('myUserNow');
    }

    function getProgress() {
      const email = getCurrentUserEmail();

      if (!email) {
        return JSON.parse(localStorage.getItem('phase1_guest_progress') || '{}');
      }

      const user = getUsers().find(u => u.email === email);
      return (user && user.progress) ? user.progress : {};
    }

    function updateProgress() {
      const progress = getProgress();
      const doneCount = lessons.filter(l => progress[l.id]).length;
      const pct = Math.round((doneCount / lessons.length) * 100);

      const fill = document.getElementById('progressFill');
      fill.style.width = pct + '%';
      fill.textContent = pct + '%';

      const email = getCurrentUserEmail();
      if (email) {
        document.getElementById('userName').textContent = email;
      }
    }

    function renderLessons() {
      const progress = getProgress();
      const grid = document.getElementById('lessonGrid');

      grid.innerHTML = '';

      lessons.forEach(lesson => {
        const done = Boolean(progress[lesson.id]);

        const card = document.createElement('article');
        card.className = 'card';

        card.innerHTML = `
          <span class="tag ${done ? 'done' : ''}">
            ${done ? 'Completed' : 'Not completed'}
          </span>
          <h2>${lesson.id}: ${lesson.title}</h2>
          <p>${lesson.desc}</p>
          <a class="openLink" href="${lesson.page}">Open lesson →</a>
        `;

        grid.appendChild(card);
      });

      updateProgress();
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
      window.location.href = 'index.html';
    });

    renderLessons();
  </script>
</body>
</html>
