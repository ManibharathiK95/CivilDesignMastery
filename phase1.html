<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phase 1 - Foundation Course</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f3f4f6; color: #111827; }
    .wrap { max-width: 900px; margin: 24px auto; padding: 0 16px 40px; }
    .topbar {
      background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 3px 14px rgba(0,0,0,.08);
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
    }
    .topbar h1 { margin: 0; font-size: 1.25rem; color: #2563eb; }
    .muted { color: #6b7280; margin-top: 4px; font-size: .95rem; }
    .btn { border: 0; border-radius: 8px; padding: 10px 14px; font-weight: 700; cursor: pointer; }
    .btn.primary { background: #2563eb; color: #fff; }
    .btn.outline { background: #fff; color: #2563eb; border: 2px solid #2563eb; }
    .progress { margin-top: 16px; height: 26px; background: #e5e7eb; border-radius: 999px; overflow: hidden; }
    .progress > div { height: 100%; width: 0%; background: linear-gradient(90deg,#2563eb,#10b981); color:#fff; font-size:.82rem; font-weight:700; display:flex; align-items:center; justify-content:center; transition: width .3s; }
    .grid { display: grid; gap: 14px; margin-top: 18px; }
    .card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 3px 14px rgba(0,0,0,.08); }
    .card h2 { margin: 0 0 8px; color: #1d4ed8; font-size: 1.08rem; }
    .card p { margin: 0 0 12px; color: #4b5563; line-height: 1.5; }
    .tag { display:inline-block; font-size:.82rem; padding:4px 8px; border-radius: 999px; background:#eef2ff; color:#4338ca; margin-bottom:8px; }
    .done { background: #dcfce7; color: #166534; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div>
        <h1>📚 Phase 1: Foundation</h1>
        <div class="muted">Welcome, <strong id="userName">Student</strong></div>
      </div>
      <button class="btn outline" id="logoutBtn">Logout</button>
    </header>

    <div class="progress" aria-label="Course progress">
      <div id="progressFill">0%</div>
    </div>

    <section class="grid" id="lessonGrid"></section>
  </div>

  <script>
    const lessons = [
      { id: 'L1', title: 'Stress & Strain Basics', desc: 'Learn stress, strain, and Hooke\'s law with practical examples.' },
      { id: 'L2', title: 'Bending Moment', desc: 'Understand shear force and bending moment in beams.' },
      { id: 'L3', title: 'Bending Stress', desc: 'Apply section modulus and flexure formulas.' },
      { id: 'L4', title: 'RC Beam Design', desc: 'Learn main design flow and safety factors.' },
      { id: 'L5', title: 'Shear Design', desc: 'Check concrete + stirrup contributions and detailing rules.' },
      { id: 'L6', title: 'One-way Slab Design', desc: 'Design slab thickness and reinforcement for a 1 m strip.' }
    ];

    function getUsers() {
      return JSON.parse(localStorage.getItem('demUsers') || '[]');
    }

    function saveUsers(users) {
      localStorage.setItem('demUsers', JSON.stringify(users));
    }

    function getCurrentUser() {
      const email = localStorage.getItem('myUserNow');
      if (!email) return null;
      return getUsers().find(u => u.email === email) || null;
    }

    function renderLessons() {
      const user = getCurrentUser();
      if (!user) {
        window.location.href = 'index.html';
        return;
      }

      const grid = document.getElementById('lessonGrid');
      grid.innerHTML = '';

      lessons.forEach(lesson => {
        const done = Boolean(user.progress && user.progress[lesson.id]);
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <span class="tag ${done ? 'done' : ''}">${done ? 'Completed' : 'Not completed'}</span>
          <h2>${lesson.id}: ${lesson.title}</h2>
          <p>${lesson.desc}</p>
          <button class="btn primary" data-lesson="${lesson.id}">${done ? 'Mark as not done' : 'Mark completed'}</button>
        `;
        grid.appendChild(card);
      });

      grid.querySelectorAll('button[data-lesson]').forEach(btn => {
        btn.addEventListener('click', () => toggleLessonDone(btn.dataset.lesson));
      });

      updateProgress();
    }

    function toggleLessonDone(lessonId) {
      const email = localStorage.getItem('myUserNow');
      const users = getUsers();
      const idx = users.findIndex(u => u.email === email);
      if (idx < 0) return;

      if (!users[idx].progress) users[idx].progress = {};
      users[idx].progress[lessonId] = !users[idx].progress[lessonId];
      saveUsers(users);
      renderLessons();
    }

    function updateProgress() {
      const user = getCurrentUser();
      if (!user) return;

      const doneCount = lessons.filter(l => user.progress && user.progress[l.id]).length;
      const pct = Math.round((doneCount / lessons.length) * 100);
      const fill = document.getElementById('progressFill');
      fill.style.width = pct + '%';
      fill.textContent = pct + '%';

      document.getElementById('userName').textContent = user.email;
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('myUserNow');
      window.location.href = 'index.html';
    });

    renderLessons();
  </script>
</body>
</html>
