<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civil Design Mastery - Login</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f9;
}
.container{
  max-width:420px;
  margin:100px auto;
  padding:25px;
  background:#fff;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
h2{text-align:center;}
input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #ccc;
  box-sizing:border-box;
}
.row{
  display:flex;
  gap:10px;
}
button{
  width:100%;
  padding:12px;
  background:#2a7de1;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
<h2>Login</h2>

<input id="name" placeholder="Name" autocomplete="name">

<div class="row">
  <input id="country" placeholder="+XX" autocomplete="tel-country-code">
  <input id="mobile" placeholder="" autocomplete="tel-national">
</div>

<input id="pin" placeholder="6-digit PIN" inputmode="numeric" maxlength="6" type="password" autocomplete="current-password">

<button onclick="login()">Login</button>
</div>

<script>
function getUsers() {
  try {
    return JSON.parse(localStorage.getItem("users")) || {};
  } catch {
    return {};
  }
}

function setUsers(users) {
  localStorage.setItem("users", JSON.stringify(users));
}

function login(){
  const name = document.getElementById("name").value.trim();
  const country = document.getElementById("country").value.trim();
  const mobile = document.getElementById("mobile").value.trim();
  const pin = document.getElementById("pin").value.trim();

  if(name.length < 2){ alert("Enter name"); return; }
  if(!country.startsWith("+")){ alert("Country code must start with +"); return; }
  if(!/^\d{6,15}$/.test(mobile)){ alert("Mobile must be 6-15 digits"); return; }
  if(!/^\d{6}$/.test(pin)){ alert("PIN must be exactly 6 digits"); return; }

  const key = `${country} ${mobile}`;
  const users = getUsers();

  if(!users[key]){
    users[key] = { name, pin, progress:{} };
  } else {
    if(users[key].pin !== pin){
      alert("Wrong PIN");
      return;
    }

    // Keep name in sync if user updates their display name.
    users[key].name = name;
  }

  setUsers(users);
  localStorage.setItem("currentUser", key);

  window.location.href = "welcome.html";
}
</script>

</body>
</html>
