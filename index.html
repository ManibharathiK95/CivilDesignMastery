<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Engineer Course - Login</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: #111827;
    }
    .card {
      width: min(420px, 92vw);
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 8px 28px rgba(0,0,0,.12);
      padding: 28px;
    }
    h1 { margin: 0 0 8px; color: #2563eb; font-size: 1.7rem; text-align: center; }
    p { margin: 0 0 18px; color: #4b5563; text-align: center; }
    .field { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; margin: 8px 0; font-size: 1rem; }
    .field:focus { border-color: #2563eb; outline: 2px solid #dbeafe; }
    .btn {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border: 0;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .btn:hover { background: #1d4ed8; }
    .switch { margin-top: 14px; text-align: center; }
    .switch a { color: #2563eb; font-weight: 700; cursor: pointer; text-decoration: none; }
    .msg { display: none; margin-bottom: 10px; padding: 10px; border-radius: 8px; font-size: .95rem; }
    .msg.ok { display: block; background: #dcfce7; color: #166534; }
    .msg.err { display: block; background: #fee2e2; color: #991b1b; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <main class="card">
    <h1>🎓 Design Engineer</h1>
    <p>Course Login</p>

    <div id="msg" class="msg"></div>

    <section id="loginView">
      <input id="loginEmail" class="field" type="email" placeholder="Email" autocomplete="email">
      <input id="loginPass" class="field" type="password" placeholder="Password" autocomplete="current-password">
      <button class="btn" id="loginBtn">Login</button>
      <div class="switch">New user? <a id="showCreate">Create account</a></div>
    </section>

    <section id="createView" class="hidden">
      <input id="createEmail" class="field" type="email" placeholder="Email" autocomplete="email">
      <input id="createPass" class="field" type="password" placeholder="Password (min 6)" autocomplete="new-password">
      <input id="createPass2" class="field" type="password" placeholder="Confirm password" autocomplete="new-password">
      <button class="btn" id="createBtn">Create Account</button>
      <div class="switch">Already have an account? <a id="showLogin">Login</a></div>
    </section>
  </main>

  <script>
    function getUsers() {
      return JSON.parse(localStorage.getItem('demUsers') || '[]');
    }

    function saveUsers(users) {
      localStorage.setItem('demUsers', JSON.stringify(users));
    }

    function showMsg(text, type) {
      const box = document.getElementById('msg');
      box.textContent = text;
      box.className = 'msg ' + type;
    }

    function hideMsg() {
      document.getElementById('msg').className = 'msg';
    }

    function showCreate() {
      document.getElementById('loginView').classList.add('hidden');
      document.getElementById('createView').classList.remove('hidden');
      hideMsg();
    }

    function showLogin() {
      document.getElementById('createView').classList.add('hidden');
      document.getElementById('loginView').classList.remove('hidden');
      hideMsg();
    }

    function createAccount() {
      const email = document.getElementById('createEmail').value.trim().toLowerCase();
      const pass = document.getElementById('createPass').value;
      const pass2 = document.getElementById('createPass2').value;

      if (!email || !pass || !pass2) {
        showMsg('Please fill all fields.', 'err');
        return;
      }
      if (pass.length < 6) {
        showMsg('Password must be at least 6 characters.', 'err');
        return;
      }
      if (pass !== pass2) {
        showMsg('Passwords do not match.', 'err');
        return;
      }

      const users = getUsers();
      if (users.some(u => u.email === email)) {
        showMsg('Email is already registered.', 'err');
        return;
      }

      users.push({ email, password: pass, progress: {}, createdAt: new Date().toISOString() });
      saveUsers(users);
      showMsg('Account created successfully. Please login.', 'ok');
      showLogin();
    }

    function login() {
      const email = document.getElementById('loginEmail').value.trim().toLowerCase();
      const pass = document.getElementById('loginPass').value;

      if (!email || !pass) {
        showMsg('Please enter email and password.', 'err');
        return;
      }

      const user = getUsers().find(u => u.email === email);
      if (!user) {
        showMsg('Email not found. Create an account first.', 'err');
        return;
      }
      if (user.password !== pass) {
        showMsg('Incorrect password.', 'err');
        return;
      }

      localStorage.setItem('myUserNow', email);
      showMsg('Login successful. Redirecting...', 'ok');
      setTimeout(() => { window.location.href = 'phase1.html'; }, 600);
    }

    document.getElementById('showCreate').addEventListener('click', showCreate);
    document.getElementById('showLogin').addEventListener('click', showLogin);
    document.getElementById('createBtn').addEventListener('click', createAccount);
    document.getElementById('loginBtn').addEventListener('click', login);
  </script>
</body>
</html>
