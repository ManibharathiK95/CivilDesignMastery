<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Civil Design Mastery - Login</title>

  <style>
    :root {
      --bg: #f4f6f9;
      --text: #222;
      --card: #ffffff;
      --primary: #2a7de1;
    }

    body.dark {
      --bg: #121212;
      --text: #f1f1f1;
      --card: #1e1e1e;
      --primary: #4da3ff;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: var(--card);
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      border: none;
      color: white;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .toggle-theme {
      position: absolute;
      top: 20px;
      right: 20px;
      cursor: pointer;
      font-size: 14px;
    }

    .error {
      color: red;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .note {
      font-size: 12px;
      text-align: center;
      margin-top: 10px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div class="toggle-theme" onclick="toggleTheme()">🌙 Toggle</div>

<div class="container">
  <h2>Civil Design Mastery</h2>

  <div id="error" class="error"></div>

  <input type="text" id="name" placeholder="Enter Full Name (new users only)" />
  <input type="text" id="mobile" placeholder="Enter Mobile Number" />
  <input type="password" id="pin" placeholder="Enter 6-digit PIN" maxlength="6"/>

  <button onclick="login()">Login / Register</button>

  <div class="note">
    New user? Enter full name, mobile + PIN to create account
  </div>
</div>

<script>
  // Load saved theme
  if(localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark");
  }

  function toggleTheme() {
    document.body.classList.toggle("dark");
    localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
  }

  function login() {
    const name = document.getElementById("name").value.trim();
    const mobile = document.getElementById("mobile").value.trim();
    const pin = document.getElementById("pin").value.trim();
    const errorDiv = document.getElementById("error");

    errorDiv.innerText = "";

    if (!mobile || mobile.length < 8) {
      errorDiv.innerText = "Enter valid mobile number";
      return;
    }

    if (!/^\d{6}$/.test(pin)) {
      errorDiv.innerText = "PIN must be exactly 6 digits";
      return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || {};

    if (users[mobile]) {
      // Existing user login
      if (users[mobile].pin === pin) {
        localStorage.setItem("currentUser", mobile);
        window.location.href = "dashboard.html";
      } else {
        errorDiv.innerText = "Incorrect PIN";
      }
    } else {
      // New user - require name
      if (!name || name.length < 3) {
        errorDiv.innerText = "Enter your full name";
        return;
      }

      users[mobile] = {
        name: name,
        pin: pin,
        progress: {}
      };

      localStorage.setItem("users", JSON.stringify(users));
      localStorage.setItem("currentUser", mobile);

      window.location.href = "dashboard.html";
    }
  }
</script>

</body>
</html>
