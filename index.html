<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Civil Design Mastery - Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
    }

    .container {
      max-width: 420px;
      margin: 80px auto;
      padding: 24px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      margin-top: 0;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      background: #2a7de1;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Login</h2>

    <input id="name" placeholder="Name" autocomplete="name" />

    <div class="row">
      <input id="country" placeholder="+91" autocomplete="tel-country-code" />
      <input id="mobile" placeholder="9876543210" autocomplete="tel-national" />
    </div>

    <input
      id="pin"
      placeholder="6-digit PIN"
      type="password"
      inputmode="numeric"
      maxlength="6"
      autocomplete="current-password"
    />

    <button onclick="login()">Login</button>
  </div>

  <script>
    function getUsers() {
      try {
        const raw = JSON.parse(localStorage.getItem("users"));
        return raw && typeof raw === "object" ? raw : {};
      } catch {
        return {};
      }
    }

    function setUsers(users) {
      localStorage.setItem("users", JSON.stringify(users));
    }

    function validateForm(name, country, mobile, pin) {
      if (name.length < 2) return "Enter a valid name";
      if (!/^\+\d{1,4}$/.test(country)) return "Country code must be like +91";
      if (!/^\d{6,15}$/.test(mobile)) return "Mobile must be 6-15 digits";
      if (!/^\d{6}$/.test(pin)) return "PIN must be exactly 6 digits";
      return "";
    }

    function login() {
      const name = document.getElementById("name").value.trim();
      const country = document.getElementById("country").value.trim();
      const mobile = document.getElementById("mobile").value.trim();
      const pin = document.getElementById("pin").value.trim();

      const error = validateForm(name, country, mobile, pin);
      if (error) {
        alert(error);
        return;
      }

      const key = `${country} ${mobile}`;
      const users = getUsers();
      const existing = users[key];

      if (!existing) {
        users[key] = { name, pin, progress: {} };
      } else {
        if (existing.pin !== pin) {
          localStorage.removeItem("currentUser");
          alert("Wrong PIN");
          return;
        }
        existing.name = name;
        existing.progress = existing.progress || {};
      }

      setUsers(users);
      localStorage.setItem("currentUser", key);
      window.location.href = "welcome.html";
    }
  </script>
</body>
</html>
