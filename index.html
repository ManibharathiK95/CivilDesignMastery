<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civil Design Mastery - Login</title>

<style>
:root{
  --bg:#f4f6f9;
  --text:#222;
  --card:#fff;
  --primary:#2a7de1;
}
body{
  margin:0;
  font-family:"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
}
.container{
  max-width:420px;
  margin:100px auto;
  padding:30px;
  background:var(--card);
  border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.1);
}
h1{text-align:center;margin-bottom:25px;}
label{display:block;margin-top:10px;font-size:0.95em;}
input{
  width:100%;
  padding:12px;
  margin-top:5px;
  margin-bottom:15px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:1em;
  box-sizing:border-box;
}
.row{
  display:flex;
  gap:10px;
}
.row input{
  flex:1;
}
button{
  width:100%;
  padding:12px;
  background:var(--primary);
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:1em;
}
button:hover{opacity:0.9;}
</style>
</head>

<body>

<div class="container">
<h1>Civil Design Mastery</h1>

<label>Name</label>
<input type="text" id="name" placeholder="Your Name">

<label>Mobile Number</label>
<div class="row">
  <input type="text" id="country" placeholder="Country Code">
  <input type="text" id="mobile" placeholder="Mobile Number">
</div>

<label>PIN</label>
<input type="password" id="pin" placeholder="6-digit PIN">

<button onclick="login()">Login / Create Account</button>
</div>

<script>
function login(){
  const name = document.getElementById("name").value.trim();
  const country = document.getElementById("country").value.trim();
  const mobile = document.getElementById("mobile").value.trim();
  const pin = document.getElementById("pin").value.trim();

  // Validation
  if(name.length < 2){
    alert("Enter valid name");
    return;
  }

  if(!/^\+\d{1,4}$/.test(country)){
    alert("Enter country code like +91");
    return;
  }

  if(!/^\d{6,12}$/.test(mobile)){
    alert("Enter valid mobile number");
    return;
  }

  if(!/^\d{6}$/.test(pin)){
    alert("PIN must be 6 digits");
    return;
  }

  const fullMobile = country + " " + mobile;

  let users = JSON.parse(localStorage.getItem("users")) || {};

  // Create or validate user
  if(!users[fullMobile]){
    users[fullMobile] = {
      name: name,
      pin: pin,
      progress: {}
    };
  } else {
    if(users[fullMobile].pin !== pin){
      alert("Incorrect PIN");
      return;
    }
  }

  localStorage.setItem("users", JSON.stringify(users));
  localStorage.setItem("currentUser", fullMobile);

  // Redirect
  window.location.href = "welcome.html";
}
</script>

</body>
</html>
