<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civil Design Mastery - Login</title>
<style>
:root{
  --bg:#f4f6f9;
  --text:#222;
  --card:#fff;
  --primary:#2a7de1;
  --input-bg:#fff;
  --input-border:#ccc;
  --input-text:#222;
}
body{
  margin:0;
  font-family:"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
}
.container{
  max-width:450px;
  margin:100px auto;
  padding:30px;
  background:var(--card);
  border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.1);
}
h1{text-align:center;margin-bottom:25px;}
label{font-size:0.95em;margin-top:10px;display:block;}
input{
  padding:12px;
  margin-top:5px;
  margin-bottom:15px;
  border-radius:8px;
  border:1px solid var(--input-border);
  background:var(--input-bg);
  font-size:1em;
  color:var(--input-text);
  width:100%;
  box-sizing:border-box;
}
.line-flex{display:flex;justify-content:space-between;}
.line-flex input.code{width:25%; margin-right:5%;}
.line-flex input.mobile{width:70%;}
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:var(--primary);
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:1em;
}
button:hover{opacity:0.9;}
.info{
  font-size:0.85em;
  color:gray;
  margin-bottom:10px;
}
.hidden{display:none;}
</style>
</head>
<body>
<div class="container">
<h1>Civil Design Mastery</h1>

<label id="nameLabel">Name</label>
<input type="text" id="name" placeholder="Your Name">

<label>Mobile Number</label>
<div class="line-flex">
  <input type="text" id="country" class="code" placeholder="Country Code">
  <input type="text" id="mobile" class="mobile" placeholder="Mobile Number" onblur="checkUser()">
</div>

<p class="info" id="userStatus">New user? Enter your name, mobile number, and PIN.<br>
Returning user? Enter mobile number and PIN only.</p>

<label for="pin">PIN</label>
<input type="password" id="pin" placeholder="6-digit PIN">

<button onclick="login()">Login / Create Account</button>
</div>

<script>
// Check if user exists when mobile is entered
function checkUser(){
  const country = document.getElementById("country").value.trim();
  const mobile = document.getElementById("mobile").value.trim();
  if(!country || !mobile) return;

  const fullMobile = country + " " + mobile;
  let users = JSON.parse(localStorage.getItem("users")) || {};

  const nameField = document.getElementById("name");
  const nameLabel = document.getElementById("nameLabel");
  const status = document.getElementById("userStatus");

  if(users[fullMobile]){
    nameField.classList.add("hidden");
    nameLabel.classList.add("hidden");
    status.textContent = "Welcome back! Enter your PIN.";
  } else {
    nameField.classList.remove("hidden");
    nameLabel.classList.remove("hidden");
    status.textContent = "New user? Enter your name, mobile number, and PIN.";
  }
}

// Login logic
function login(){
  const name = document.getElementById("name").value.trim();
  const country = document.getElementById("country").value.trim();
  const mobile = document.getElementById("mobile").value.trim();
  const pin = document.getElementById("pin").value.trim();

  const countryRegex=/^\+\d{1,4}$/;
  const mobileRegex=/^\d{6,12}$/;
  const pinRegex=/^\d{6}$/;

  if(!countryRegex.test(country)){alert("Invalid country code!"); return;}
  if(!mobileRegex.test(mobile)){alert("Invalid mobile number!"); return;}
  if(!pinRegex.test(pin)){alert("PIN must be 6 digits!"); return;}

  const fullMobile = country + " " + mobile;
  let users = JSON.parse(localStorage.getItem("users")) || {};

  if(!users[fullMobile]){
    // NEW USER → save & go to welcome page
    if(name.length < 2){alert("Enter your name to create account."); return;}
    users[fullMobile] = {name:name, pin:pin, progress:{}};
    localStorage.setItem("users", JSON.stringify(users));
    localStorage.setItem("currentUser", fullMobile);
    window.location.href="welcome.html";
  } else {
    // RETURNING USER → validate PIN & go to dashboard
    if(users[fullMobile].pin !== pin){alert("Incorrect PIN!"); return;}
    localStorage.setItem("currentUser", fullMobile);
    window.location.href="dashboard.html";
  }
}
</script>
</body>
</html>
