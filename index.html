<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civil Design Mastery - Login</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f9;
}
.container{
  max-width:420px;
  margin:100px auto;
  padding:25px;
  background:#fff;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
h2{text-align:center;}
input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #ccc;
}
.row{
  display:flex;
  gap:10px;
}
button{
  width:100%;
  padding:12px;
  background:#2a7de1;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
<h2>Login</h2>

<input id="name" placeholder="Name">

<div class="row">
  <input id="country" placeholder="+91">
  <input id="mobile" placeholder="9876543210">
</div>

<input id="pin" placeholder="6-digit PIN">

<button onclick="login()">Login</button>
</div>

<script>
function login(){
  try{
    const name = document.getElementById("name").value.trim();
    const country = document.getElementById("country").value.trim();
    const mobile = document.getElementById("mobile").value.trim();
    const pin = document.getElementById("pin").value.trim();

    console.log("Inputs:", name, country, mobile, pin);

    // Validation
    if(name.length < 2){ alert("Enter name"); return; }
    if(!country.startsWith("+")){ alert("Country code must start with +"); return; }
    if(mobile.length < 6){ alert("Invalid mobile"); return; }
    if(pin.length !== 6){ alert("PIN must be 6 digits"); return; }

    const key = country + " " + mobile;

    let users = JSON.parse(localStorage.getItem("users")) || {};

    if(!users[key]){
      users[key] = { name:name, pin:pin, progress:{} };
    } else {
      if(users[key].pin !== pin){
        alert("Wrong PIN");
        return;
      }
    }

    localStorage.setItem("users", JSON.stringify(users));
    localStorage.setItem("currentUser", key);

    console.log("Saved. Redirecting...");

    // 🔥 HARD redirect
    window.location.href = "welcome.html";

  } catch(err){
    alert("Error: " + err.message);
    console.error(err);
  }
}
</script>

</body>
</html>
